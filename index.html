<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lund Films</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-dim"></div>

  <!-- Rough, hand-printed edge filter for the banner text -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="roughEdge" x="-8%" y="-8%" width="116%" height="116%"
            filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="2"
                    seed="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.7"
                         xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <nav>
    <a href="index.html" class="logo">Lund Films</a>
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="stills.html">Stills</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- Showreel hero -->
  <section class="showreel">
    <div class="showreel-frame">
      <video
        class="showreel-video"
        autoplay
        muted
        loop
        playsinline
        poster="assets/showreel-poster.jpg">
        <source src="assets/showreel.mp4" type="video/mp4">
      </video>
      <div class="showreel-overlay">
        <h1>Lund Films</h1>
        <p>Filmmaker &amp; Visual Storyteller</p>
      </div>
    </div>
  </section>

  <!-- Intro line -->
  <section class="intro">
    <h2>Stories told through light, motion, and sound.</h2>
  </section>

  <!-- Section label above the collage, with an Apple-style word reveal -->
  <div class="collage-intro">
    <p class="reveal-text">A selection of recent films.</p>
  </div>

  <!-- Project collage -->
  <section id="work" class="collage">

    <a href="project-1.html" class="tile">
      <div class="tile-media">
        <img src="assets/thumbnails/project-1.jpg" alt="Project One" loading="lazy">
      </div>
      <div class="tile-caption"><h3>Project One</h3><p>Short Film · 2025</p></div>
    </a>

    <a href="project-2.html" class="tile">
      <div class="tile-media">
        <img src="assets/thumbnails/project-2.jpg" alt="Project Two" loading="lazy">
      </div>
      <div class="tile-caption"><h3>Project Two</h3><p>Music Video · 2025</p></div>
    </a>

  </section>

  <!-- CTA -->
  <section class="cta">
    <h2>Let's make something.</h2>
    <a href="contact.html" class="btn">Get in touch</a>
  </section>

  <footer>
    <p>&copy; 2026 Lund Films</p>
  </footer>

  <script>
    // Ensure the showreel starts even if the browser defers autoplay
    (function () {
      var v = document.querySelector('.showreel-video');
      if (!v) return;
      function play() { var p = v.play(); if (p && p.catch) p.catch(function () {}); }
      play();
      v.addEventListener('loadeddata', play);
      v.addEventListener('canplay', play);
      function onInteract() {
        if (v.paused) play();
        window.removeEventListener('pointerdown', onInteract);
        window.removeEventListener('keydown', onInteract);
        window.removeEventListener('scroll', onInteract);
      }
      window.addEventListener('pointerdown', onInteract, { passive: true });
      window.addEventListener('keydown', onInteract);
      window.addEventListener('scroll', onInteract, { passive: true });
    })();

    // Scroll-driven choreography: dim the page, vanish the intro with motion
    // blur, and reveal the CTA (with its own motion blur as it settles).
    (function () {
      var nav = document.querySelector('nav');
      var dim = document.querySelector('.bg-dim');
      var intro = document.querySelector('.intro');
      var collage = document.querySelector('.collage');
      var revealText = document.querySelector('.reveal-text');
      var revealWords = [];
      var ctaH2 = document.querySelector('.cta h2');
      var ctaBtn = document.querySelector('.cta .btn');
      var clamp = function (v) { return v < 0 ? 0 : v > 1 ? 1 : v; };
      var ticking = false;

      // Split the label into per-word spans for the scroll-scrubbed reveal
      if (revealText) {
        var words = revealText.textContent.split(' ');
        revealText.textContent = '';
        words.forEach(function (word, i) {
          var s = document.createElement('span');
          s.textContent = word;
          revealText.appendChild(s);
          revealWords.push(s);
          if (i < words.length - 1) {
            revealText.appendChild(document.createTextNode(' '));
          }
        });
      }

      function update() {
        var vh = window.innerHeight;
        var y = window.scrollY;

        // --- Page dim, tied to collage approach ---
        var cAbs = collage.getBoundingClientRect().top + y;
        var dimP = clamp((y - (cAbs - vh * 0.95)) / (vh * 0.7));
        if (dim) dim.style.opacity = dimP.toFixed(3);

        // --- Section label: each word reveals scrubbed by the scroll wheel ---
        if (revealText && revealWords.length) {
          var lr = revealText.getBoundingClientRect();
          var lp = clamp((vh * 0.86 - lr.top) / (vh * 0.34));
          var n = revealWords.length;
          for (var i = 0; i < n; i++) {
            var local = clamp((lp - i * (0.55 / n)) / 0.45);
            var w = revealWords[i];
            w.style.opacity = local.toFixed(3);
            w.style.transform = 'translateY(' + ((1 - local) * 14).toFixed(1) + 'px)';
            w.style.filter = 'blur(' + ((1 - local) * 6).toFixed(2) + 'px)';
          }
        }

        // --- Intro vanishes upward with a smooth CSS motion blur ---
        if (intro) {
          var ir = intro.getBoundingClientRect();
          var ip = clamp((vh * 0.34 - ir.top) / (vh * 0.5));
          intro.style.transform = 'translateY(' + (-ip * 120).toFixed(1) + 'px)';
          intro.style.opacity = (1 - ip).toFixed(3);
          // GPU-accelerated CSS blur (smooth) — starts later, no velocity jitter
          var ipBlur = clamp((ip - 0.4) / 0.6) * 14;
          intro.style.filter = ipBlur > 0.1 ? 'blur(' + ipBlur.toFixed(1) + 'px)' : 'none';
        }

        // --- CTA reveal at the bottom: rises and fades in, no blur ---
        if (ctaH2) {
          var hr = ctaH2.getBoundingClientRect();
          var bp = clamp((vh - hr.top) / (vh * 0.38));
          ctaH2.style.transform = 'translateY(' + ((1 - bp) * 70).toFixed(1) +
            'px) scale(' + (0.95 + 0.05 * bp).toFixed(3) + ')';
          ctaH2.style.opacity = bp.toFixed(3);
          ctaH2.style.color = '#ffffff';
          if (ctaBtn) {
            var bp2 = clamp((vh - hr.top - 40) / (vh * 0.38));
            ctaBtn.style.transform = 'translateY(' + ((1 - bp2) * 50).toFixed(1) + 'px)';
            ctaBtn.style.opacity = bp2.toFixed(3);
          }
        }

        ticking = false;
      }

      window.addEventListener('scroll', function () {
        if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
      }, { passive: true });
      window.addEventListener('resize', update);
      update();
    })();

    // Collage tiles emerge from the dark as they scroll in, then stay put
    (function () {
      var tiles = document.querySelectorAll('.tile');
      if (!('IntersectionObserver' in window)) {
        tiles.forEach(function (t) { t.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.style.transitionDelay = (e.target.dataset.delay || '0s');
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      tiles.forEach(function (t, i) {
        t.dataset.delay = (i % 2) * 0.08 + 's';
        io.observe(t);
      });
    })();
  </script>

</body>
</html>

  <script>
    // Photos fade up as they scroll into view
    (function () {
      var items = document.querySelectorAll('.still');
      if (!('IntersectionObserver' in window)) {
        items.forEach(function (i) { i.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      items.forEach(function (i) { io.observe(i); });
    })();

    // Fullscreen lightbox: click to enlarge, arrows/keys/swipe to navigate
    (function () {
      var imgs = [].slice.call(document.querySelectorAll('.stills-grid .still img'));
      if (!imgs.length) return;
      var lb = document.createElement('div');
      lb.className = 'lightbox';
      lb.innerHTML =
        '<button class="lb-close" type="button" aria-label="Close">&times;</button>' +
        '<button class="lb-prev" type="button" aria-label="Previous">&lsaquo;</button>' +
        '<img alt="">' +
        '<button class="lb-next" type="button" aria-label="Next">&rsaquo;</button>' +
        '<div class="lb-counter"></div>';
      document.body.appendChild(lb);
      var big = lb.querySelector('img');
      var counter = lb.querySelector('.lb-counter');
      var i = 0;
      function show(n) {
        i = (n + imgs.length) % imgs.length;
        big.src = imgs[i].src;
        counter.textContent = (i + 1) + ' / ' + imgs.length;
      }
      function open(n) { show(n); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function close() { lb.classList.remove('open'); document.body.style.overflow = ''; }
      imgs.forEach(function (im, idx) { im.addEventListener('click', function () { open(idx); }); });
      lb.querySelector('.lb-close').addEventListener('click', close);
      lb.querySelector('.lb-prev').addEventListener('click', function (e) { e.stopPropagation(); show(i - 1); });
      lb.querySelector('.lb-next').addEventListener('click', function (e) { e.stopPropagation(); show(i + 1); });
      lb.addEventListener('click', function (e) { if (e.target === lb) close(); });
      document.addEventListener('keydown', function (e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowRight') show(i + 1);
        else if (e.key === 'ArrowLeft') show(i - 1);
      });
      var sx = 0;
      lb.addEventListener('touchstart', function (e) { sx = e.touches[0].clientX; }, { passive: true });
      lb.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - sx;
        if (Math.abs(dx) > 40) show(dx < 0 ? i + 1 : i - 1);
      }, { passive: true });
    })();
  </script>

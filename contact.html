<body>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="roughEdge" x="-8%" y="-8%" width="116%" height="116%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="2" seed="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <nav>
    <a href="index.html" class="logo">Lund Films</a>
    <div class="nav-links">
      <a href="projects.html">Projects</a>
      <a href="stills.html">Stills</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section class="contact-page">
    <div class="contact-inner">
      <h1>Get in touch.</h1>
      <p class="contact-lead">
        Have a project in mind? Send me a message and I'll get back to you.
      </p>

      <form class="contact-form" action="https://formsubmit.co/algotlundmedia@gmail.com" method="POST">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn">Send message</button>
      </form>

      <p class="contact-alt">
        Or email directly at
        <a href="mailto:algotlundmedia@gmail.com">algotlundmedia@gmail.com</a>
      </p>
    </div>
  </section>

  <footer>
    <div class="footer-links"><a href="https://www.instagram.com/lund.films/" target="_blank" rel="noopener">Instagram</a></div>
    <p>&copy; 2026 Lund Films</p>
  </footer>

  <script src="back-to-top.js" defer></script>
</body>
</html>

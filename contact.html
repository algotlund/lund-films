<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Lund Films</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Lund Films</a>
    <div class="nav-links">
      <a href="index.html#work">Work</a>
      <a href="stills.html">Stills</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section class="contact-page">
    <div class="contact-inner">
      <h1>Get in touch.</h1>
      <p class="contact-lead">
        Have a project in mind? Send me a message and I'll get back to you.
      </p>

      <form class="contact-form" action="https://formsubmit.co/hello@lundfilms.com" method="POST">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn">Send message</button>
      </form>

      <p class="contact-alt">
        Or email directly at
        <a href="mailto:hello@lundfilms.com">hello@lundfilms.com</a>
      </p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Lund Films</p>
  </footer>

</body>
</html>
